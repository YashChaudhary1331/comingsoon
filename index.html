<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Responsive Vision</title>
    <style>
        :root {
            --primary: #977f67;
            --bg-light: #ebe9e7;
            --bg-alt: #fdfdfd;
            --text-dark: #2d2d2d;
            --text-muted: #666666;
            --white: #ffffff;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            /* Updated font stack to prioritize clean sans-serif for mobile readability */
            font-family: 'Montserrat', 'Optima', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Responsive Heading */
        .main-heading {
            font-size: clamp(0.7rem, 2vw, 0.9rem);
            letter-spacing: clamp(0.3rem, 4vw, 0.8rem);
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 2rem;
            text-align: center;
            animation: fadeIn 3s ease-in;
            font-weight: 300;
        }

        .card {
            background: var(--card-bg);
            padding: clamp(2rem, 8vw, 4rem) clamp(1.5rem, 5vw, 3rem);
            border-radius: 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            max-width: 550px;
            width: 100%; /* Responsive width */
            text-align: center;
            border-top: 6px solid var(--primary);
            position: relative;
        }

        h1 {
            font-weight: 400;
            font-size: clamp(1.5rem, 6vw, 2rem);
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        p {
            color: var(--text-muted);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--primary);
            margin: 0 auto 2rem;
        }

        /* Refined Responsive Loader */
        .loader-track {
            width: 100%;
            height: 1px;
            background: #e0e0e0;
            position: relative;
            margin-top: 2rem;
        }

        .loader-fill {
            position: absolute;
            height: 100%;
            width: 99%;
            background: var(--primary);
            animation: slow-progress 15s ease-out infinite;
        }

        .status {
            font-size: clamp(0.6rem, 2vw, 0.65rem);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 15px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slow-progress {
            0% { width: 0%; }
            40% { width: 60%; }
            90% { width: 98.5%; }
            100% { width: 99%; }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 2.5rem 1.5rem;
            }
            .main-heading {
                letter-spacing: 0.3rem; /* Reduce spacing so it doesn't wrap awkwardly */
            }
        }
    </style>
</head>
<body>

    <div class="main-heading">Coming Spring 2026</div>

    <div class="card">
        <h1>Under Construction</h1>
        <div class="divider"></div>
        <p>Something beautiful is quietly being assembled. <br> 
           Mostly because the developer is currently arguing with a semicolon.</p>
        
        <div class="loader-track">
            <div class="loader-fill"></div>
        </div>
        <div class="status">Polishing the pixels... 99%</div>
    </div>
    
</body>
</html>
